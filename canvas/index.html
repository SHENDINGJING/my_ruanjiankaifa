<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票监控Canvas</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        .stock-card {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }
        .stock-card:hover {
            transform: translateY(-5px);
        }
        .stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .stock-name {
            font-size: 1.5em;
            font-weight: bold;
        }
        .stock-symbol {
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
        }
        .price-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .price-item {
            text-align: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .price-label {
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 5px;
        }
        .price-value {
            font-size: 1.8em;
            font-weight: bold;
        }
        .profit-positive {
            color: #4ade80;
        }
        .profit-negative {
            color: #f87171;
        }
        .alert-box {
            background: rgba(239, 68, 68, 0.2);
            border-left: 4px solid #ef4444;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
        .alert-box.show {
            display: block;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 0.9em;
            opacity: 0.8;
        }
        #lastUpdate {
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 股票实时监控系统</h1>
        
        <div id="stockContainer">
            <!-- 股票信息将通过JavaScript动态加载 -->
            <div class="stock-card">
                <div class="stock-header">
                    <div class="stock-name">中国石油</div>
                    <div class="stock-symbol">601857</div>
                </div>
                <div class="price-info">
                    <div class="price-item">
                        <div class="price-label">当前价格</div>
                        <div class="price-value" id="currentPrice">12.16</div>
                    </div>
                    <div class="price-item">
                        <div class="price-label">成本价格</div>
                        <div class="price-value" id="costPrice">12.465</div>
                    </div>
                    <div class="price-item">
                        <div class="price-label">盈亏比例</div>
                        <div class="price-value profit-negative" id="profitPct">-2.45%</div>
                    </div>
                    <div class="price-item">
                        <div class="price-label">距止损</div>
                        <div class="price-value" id="toStopLoss">+4.9%</div>
                    </div>
                </div>
                <div class="alert-box" id="alertBox">
                    🚨 注意：已接近止损价！
                </div>
            </div>
        </div>
        
        <div class="status-bar">
            <div>状态: <span id="statusText">监控中...</span></div>
            <div>最后更新: <span id="lastUpdate">--:--:--</span></div>
        </div>
    </div>

    <script>
        // 股票数据
        let stockData = {
            "601857": {
                name: "中国石油",
                currentPrice: 12.16,
                costPrice: 12.465,
                shares: 800,
                stopLoss: 11.592,
                firstTarget: 14.335
            }
        };

        // 更新股票显示
        function updateStockDisplay() {
            const stock = stockData["601857"];
            const profitPct = ((stock.currentPrice - stock.costPrice) / stock.costPrice * 100).toFixed(2);
            const toStopLossPct = ((stock.currentPrice - stock.stopLoss) / stock.stopLoss * 100).toFixed(1);
            
            document.getElementById('currentPrice').textContent = stock.currentPrice.toFixed(3);
            document.getElementById('costPrice').textContent = stock.costPrice.toFixed(3);
            document.getElementById('profitPct').textContent = profitPct + '%';
            document.getElementById('toStopLoss').textContent = '+' + toStopLossPct + '%';
            
            // 更新盈亏颜色
            const profitElement = document.getElementById('profitPct');
            profitElement.className = profitPct >= 0 ? 'price-value profit-positive' : 'price-value profit-negative';
            
            // 检查是否需要显示警告
            const alertBox = document.getElementById('alertBox');
            if (toStopLossPct < 2) {
                alertBox.classList.add('show');
                alertBox.textContent = '🚨 警告：距离止损仅剩 ' + toStopLossPct + '%！';
            } else {
                alertBox.classList.remove('show');
            }
            
            // 更新最后更新时间
            const now = new Date();
            document.getElementById('lastUpdate').textContent = 
                now.getHours().toString().padStart(2, '0') + ':' +
                now.getMinutes().toString().padStart(2, '0') + ':' +
                now.getSeconds().toString().padStart(2, '0');
        }

        // 模拟价格更新
        function simulatePriceChange() {
            const stock = stockData["601857"];
            // 随机价格变化 (-0.05 到 +0.05)
            const change = (Math.random() - 0.5) * 0.1;
            stock.currentPrice += change;
            
            // 确保价格在合理范围内
            stock.currentPrice = Math.max(11.0, Math.min(15.0, stock.currentPrice));
            
            updateStockDisplay();
        }

        // 初始更新
        updateStockDisplay();
        
        // 每5秒更新一次价格（模拟）
        setInterval(simulatePriceChange, 5000);
        
        // 每30秒从服务器获取真实数据
        setInterval(fetchRealData, 30000);
        
        async function fetchRealData() {
            try {
                const response = await fetch('/api/stock-data');
                if (response.ok) {
                    const data = await response.json();
                    // 更新股票数据
                    if (data["601857"]) {
                        Object.assign(stockData["601857"], data["601857"]);
                        updateStockDisplay();
                    }
                }
            } catch (error) {
                console.log('获取数据失败:', error);
            }
        }
        
        // 页面可见性变化处理
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                document.getElementById('statusText').textContent = '后台运行';
            } else {
                document.getElementById('statusText').textContent = '监控中...';
            }
        });
    </script>
</body>
</html>
